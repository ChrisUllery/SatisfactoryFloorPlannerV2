<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Satisfactory Floor Planner V2</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="sidebar-header">
        <h1>Satisfactory Floor Planner V2</h1>
        <p>Diagnostic-only phase for SFMD validation.</p>
      </header>

      <section class="panel">
        <h2>Project</h2>
        <button id="newLayoutBtn" type="button">New Layout</button>
      </section>

      <section class="panel">
        <h2>Import</h2>

        <!-- Primary IDs expected by the diagnostic app.js -->
        <input id="importFactoryFile" type="file" accept=".sfmd,.json" />
        <button id="runSfmdDiagnosticBtn" type="button">Run SFMD Diagnostic</button>

        <!-- Optional legacy-compatible fallback IDs (hidden) -->
        <!-- Keep if you want older code paths/tools to still find these IDs -->
        <input
          id="factoryFileInput"
          type="file"
          accept=".sfmd,.json"
          style="display:none"
          aria-hidden="true"
          tabindex="-1"
        />
        <button
          id="importFactoryBtn"
          type="button"
          style="display:none"
          aria-hidden="true"
          tabindex="-1"
        >
          Import Factory
        </button>

        <div id="sfmdDiagnosticSummary" class="diagnostic-summary"></div>
        <pre id="sfmdDiagnosticOutput" class="diagnostic-output"></pre>

        <p class="hint">
          Diagnostic-only mode: upload an SFMD file, classify nodes, and review unknowns.
        </p>
      </section>

      <section class="panel">
        <h2>View</h2>
        <button id="fitViewBtn" type="button">Fit View</button>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div id="statusText">Ready.</div>
      </section>
    </aside>

    <main id="workspace">
      <canvas id="plannerCanvas"></canvas>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
